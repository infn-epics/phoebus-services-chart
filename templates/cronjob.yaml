{{- if eq .Values.phoebusservice "olog" }}
{{- if .Values.ologBackup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "phoebus-services-chart.fullname" . }}-backup
  labels:
    {{- include "phoebus-services-chart.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.ologBackup.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "phoebus-services-chart.selectorLabels" . | nindent 12 }}
        spec:
          containers:
          - name: {{ include "phoebus-services-chart.fullname" . }}-backup
            image: {{ .Values.ologBackup.image }}
            {{- if .Values.epicsConfiguration.name }}
            envFrom:
              - configMapRef:
                  name: {{ .Values.epicsConfiguration.name }}
            {{- end }}
            
            command:
            - /bin/sh
            - -c
            - |
              # Install dependencies if needed
              pip install olog-tool

              # Generate timestamp for filenames
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)

              # Create backup
              olog-tool --url http://{{ include "phoebus-services-chart.fullname" . }}.{{.Values.beamline}}.svc:8080/Olog --username {{ .Values.ologBackup.username | quote }} --password {{ .Values.ologBackup.password | quote }} backup --output /nfs/backups/backup_$TIMESTAMP

              # Generate reports
              olog-tool --url http://{{ include "phoebus-services-chart.fullname" . }}.{{.Values.beamline}}.svc:8080/Olog --username {{ .Values.ologBackup.username | quote }} --password {{ .Values.ologBackup.password | quote }} markdown --daybreak --output /nfs/documents/report_$TIMESTAMP.md --title "{{ .Values.ologBackup.title }} $TIMESTAMP"
              olog-tool --url http://{{ include "phoebus-services-chart.fullname" . }}.{{.Values.beamline}}.svc:8080/Olog --username {{ .Values.ologBackup.username | quote }} --password {{ .Values.ologBackup.password | quote }} pdf --daybreak --output /nfs/documents/report_$TIMESTAMP.pdf --title "{{ .Values.ologBackup.title }} $TIMESTAMP"
              olog-tool --url http://{{ include "phoebus-services-chart.fullname" . }}.{{.Values.beamline}}.svc:8080/Olog --username {{ .Values.ologBackup.username | quote }} --password {{ .Values.ologBackup.password | quote }} html --daybreak --output /nfs/documents/report.html --title "{{ .Values.ologBackup.title }} $TIMESTAMP"
            volumeMounts:
            {{- range .Values.nfsBackups }}
              - name: {{ .name }}
                mountPath: {{ .mountPath }}
            {{- end }}

          volumes:
            {{- range .Values.nfsBackups }}
              - name: {{ .name }}
                nfs:
                  server: {{ .server }}
                  path: {{ .path }}
            {{- end }}
          restartPolicy: OnFailure
{{- end }}
{{- end }}
---
{{- if eq .Values.phoebusservice "channelfinder" }}
{{- if .Values.channelfinderFeeder.enabled }}
{{- $gitUrl := .Values.channelfinderFeeder.gitRepoConfig.url | default .Values.giturl | default "" }}
{{- $gitBranch := .Values.channelfinderFeeder.gitRepoConfig.branch | default .Values.gitrev | default "" }}
{{- $gitPath := .Values.channelfinderFeeder.gitRepoConfig.path | default "deploy/values.yaml" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "phoebus-services-chart.fullname" . }}-feeder
  labels:
    {{- include "phoebus-services-chart.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.channelfinderFeeder.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "phoebus-services-chart.selectorLabels" . | nindent 12 }}
        spec:
          {{- if $gitUrl }}
          initContainers:
          - name: init-git-clone
            image: {{ .Values.initcontainer.image | quote }}
            imagePullPolicy: IfNotPresent
            {{- if .Values.epicsConfiguration.name }}
            envFrom:
              - configMapRef:
                  name: {{ .Values.epicsConfiguration.name }}
            {{- end }}
            command:
            - sh
            - -c
            - |
              set -e
              cd /git-data
              {{- if .Values.epik8s_secrets }}
              git config --global credential.helper "store --file=/.ssh/git_token"
              {{- end }}
              if [ -n "{{ $gitBranch }}" ]; then
                git clone --depth 1 -b {{ $gitBranch }} {{ $gitUrl }} repo
              else
                git clone --depth 1 {{ $gitUrl }} repo
              fi
              ls /git-data/repo
            volumeMounts:
            - name: git-data
              mountPath: /git-data
            {{- if .Values.epik8s_secrets }}
            - name: secrets-volume
              mountPath: /.ssh
              readOnly: true
            {{- end }}
          {{- end }}
          containers:
          - name: {{ include "phoebus-services-chart.fullname" . }}-feeder
            image: {{ .Values.channelfinderFeeder.image }}
            imagePullPolicy: Always
            {{- if .Values.epicsConfiguration.name }}
            envFrom:
              - configMapRef:
                  name: {{ .Values.epicsConfiguration.name }}
            {{- end }}
            args:
            - {{ .Values.channelfinderFeeder.pvlistDir | quote }}
            - "http://{{ include "phoebus-services-chart.fullname" . }}.{{ .Values.beamline }}.svc:8080/ChannelFinder"
            - {{ .Values.channelfinder.user | quote }}
            - {{ .Values.channelfinder.password | quote }}
            {{- if .Values.channelfinderFeeder.noPva }}
            - "--no-pva"
            {{- end }}
            {{- if $gitUrl }}
            - "--values-yaml"
            - "/git-data/repo/{{ $gitPath }}"
            {{- else if .Values.channelfinderFeeder.valuesYaml }}
            - "--values-yaml"
            - {{ .Values.channelfinderFeeder.valuesYaml | quote }}
            {{- end }}
            {{- if .Values.channelfinderFeeder.cleanupDays }}
            - "--cleanup-days"
            - {{ .Values.channelfinderFeeder.cleanupDays | quote }}
            {{- end }}
            {{- if .Values.channelfinderFeeder.removeNoTimestamp }}
            - "--remove-no-timestamp"
            {{- end }}
            volumeMounts:
            {{- range .Values.nfsMounts }}
              - name: {{ .name }}
                mountPath: {{ .mountPath }}
            {{- end }}
            {{- if $gitUrl }}
              - name: git-data
                mountPath: /git-data
                readOnly: true
            {{- end }}
          volumes:
          {{- range .Values.nfsMounts }}
            - name: {{ .name }}
              nfs:
                server: {{ .server }}
                path: {{ .path }}
          {{- end }}
          {{- if $gitUrl }}
            - name: git-data
              emptyDir: {}
          {{- end }}
          {{- if .Values.epik8s_secrets }}
            - name: secrets-volume
              secret:
                secretName: "{{ .Values.epik8s_secrets }}"
                items:
                - key: "id_rsa"
                  path: "id_rsa"
                  mode: 0400
                - key: "id_rsa.pub"
                  path: "id_rsa.pub"
                - key: "git_token"
                  path: "git_token"
          {{- end }}
          restartPolicy: OnFailure
{{- end }}
{{- end }}